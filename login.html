<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Back | Choose Your Next Memory</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="script.js" defer></script>
</head>

<body>

    <!-- Header -->
    <header>
        <div class="container">
            <nav>
                <div class="logo">NextMemory.</div>
                <div class="menu-toggle" id="mobile-menu">
                    <i class="fas fa-bars"></i>
                </div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="discover.html">Discover Trips</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="signup.html" class="btn btn-primary">Sign Up</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="auth-section"
        style="height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1504609773096-104ff2c73ba4?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') center/cover;">
        <div class="auth-card"
            style="background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; box-shadow: var(--shadow-lg);">
            <h2 style="margin-bottom: 20px;">Welcome Back</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Continue your adventure.</p>

            <form id="loginForm">
                <div class="form-group" style="margin-bottom: 20px; text-align: left;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Email Address</label>
                    <input type="email" id="loginEmail" required
                        style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;">
                </div>

                <div class="form-group" style="margin-bottom: 30px; text-align: left;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Password</label>
                    <input type="password" id="loginPassword" required
                        style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;">
                </div>

                <div id="loginError" style="color: red; font-size: 0.9rem; margin-bottom: 15px; display: none;">
                    Invalid email or password. Please sign up first.
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
            </form>

            <p style="margin-top: 20px; font-size: 0.9rem;">
                Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 600;">Sign
                    Up</a>
            </p>
        </div>
    </section>

</body>

</html>
